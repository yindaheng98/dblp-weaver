<!DOCTYPE html>
<html lang="en">
<head>
    <title>Vis Network | Data | Scaling Labels</title>

    <style type="text/css">
        html,
        body {
            font: 10pt arial;
        }

        #network {
            width: 40%;
            height: 600px;
            float: left;
        }

        #data {
            width: 60%;
            height: 600px;
            float: right;
            overflow: scroll;
        }

        #publications {
            width: 100%;
        }
    </style>

    <script type="text/javascript"
            src="https://unpkg.com/vis-network@9.1.2/dist/vis-network.min.js"></script>
    <script type="text/javascript"
            src="https://unpkg.com/echarts@5.3.3/dist/echarts.min.js"></script>
    <script type="text/javascript"
            src="summary.js"></script>

    <script type="text/javascript">
        var nodes = null;
        var edges = null;
        var network = null;

        function draw() {

            // Instantiate our network object.
            var container = document.getElementById("network");
            var options = {
                nodes: {
                    shape: "circle",
                    scaling: {
                        label: {
                            min: 0,
                            max: 25,
                        },
                    },
                },
            };
            nodes = new vis.DataSet(data.nodes)
            edges = new vis.DataSet(data.edges)
            network = new vis.Network(container, {nodes: nodes, edges: edges}, options);
            text = ''
            network.on("click", function (properties) {
                if (properties.nodes.length > 0) {
                    let n = nodes.get(properties.nodes)[0]
                    text = n.data.person + "\n\n" + n.data.publications.join('\n\n')
                } else if (properties.edges.length > 0) {
                    let e = edges.get(properties.edges)[0]
                    text = e.data.publications.join('\n\n')
                }
                document.getElementById("publications").innerText = text
            });

            ccfpie = echarts.init(document.getElementById("ccfpie"));
            conpie = echarts.init(document.getElementById("conpie"));
            line = echarts.init(document.getElementById("line"));
            network.on("click", function (properties) {
                if (properties.nodes.length > 0) {
                    let n = nodes.get(properties.nodes)[0]
                    ccf_count = {A: 0, B: 0, C: 0, N: 0}
                    ccf_year_count = {}
                    journal_count = {}
                    journal_ccf = {A: {}, B: {}, C: {}, N: {}}
                    for (year = 2010; year <= 2022; year++) {
                        ccf_year_count[year] = {A: 0, B: 0, C: 0, N: 0}
                    }
                    for (key in n.data.detail) {
                        pub = n.data.detail[key]
                        ccf_count[pub.CCF]++
                        if (ccf_year_count[pub.year])
                            ccf_year_count[pub.year][pub.CCF]++
                        if (pub.journal === null)
                            continue
                        if (journal_count[pub.journal] === undefined)
                            journal_count[pub.journal] = 0
                        journal_count[pub.journal]++
                        journal_ccf[pub.CCF][pub.journal] = 1
                    }
                    conpie_data = []
                    for (key of ['A', 'B', 'C']) {
                        for (journal in journal_ccf[key]) {
                            conpie_data.push({name: journal, value: journal_count[journal]})
                        }
                    }
                    ccfpie.setOption({
                        series: [
                            {
                                type: "pie",
                                data: [
                                    {name: "CCF A", value: ccf_count.A},
                                    {name: "CCF B", value: ccf_count.B},
                                    {name: "CCF C", value: ccf_count.C},
                                ],
                                label: {
                                    formatter: '{b}: {c}篇',
                                    position: 'inside'
                                }
                            }
                        ]
                    })
                    conpie.setOption({
                        series: [
                            {
                                type: "pie",
                                data: conpie_data,
                                label: {
                                    formatter: '{b}: {c}篇'
                                }
                            }
                        ]
                    })

                    years = []
                    year_ccf = {A: [], B: [], C: [], N: []}
                    for (year = 2010; year <= 2022; year++) {
                        years.push(year)
                        year_ccf.A.push(ccf_year_count[year].A)
                        year_ccf.B.push(ccf_year_count[year].B)
                        year_ccf.C.push(ccf_year_count[year].C)
                        year_ccf.N.push(ccf_year_count[year].N)
                    }
                    line.setOption({
                        legend: {
                            orient: 'vertical',
                            right: 10,
                            top: 'center',
                        },
                        xAxis: {
                            name: '年份',
                            type: 'category',
                            axisTick: {
                                alignWithLabel: true
                            },
                            data: years
                        },
                        yAxis: {
                            name: '论文数'
                        },
                        series: [
                            {
                                name: "CCF A",
                                data: year_ccf.A,
                                type: 'line',
                            },
                            {
                                name: "CCF B",
                                data: year_ccf.B,
                                type: 'line',
                            },
                            {
                                name: "CCF C",
                                data: year_ccf.C,
                                type: 'line',
                            }
                        ]
                    })
                }
            });
        }
    </script>
</head>
<body onload="draw()">
<div id="network"></div>
<div id="data">
    <div id="chart" style="height: 600px; width: 100%">
        <div style="height: 300px; width: 100%">
            <div id="ccfpie" style="height: 300px; width: 50%; float:left"></div>
            <div id="conpie" style="height: 300px; width: 50%; float:right"></div>
        </div>
        <div id="line" style="height: 300px; width: 100%"></div>
    </div>
    <div id="publications"></div>
</div>
</body>
</html>
